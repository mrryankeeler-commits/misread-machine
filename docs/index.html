<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Psychology Machine</title>
  <meta name="description" content="An interactive thought-tool for story psychology, curiosity gaps, and trust-building hooks." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header shell">
    <p class="brand">Story Psychology Machine</p>
    <a class="text-link" href="#lab">Enter the lab</a>
  </header>

  <main class="shell">
    <section id="hero" class="hero"></section>

    <section id="premise" class="section"></section>

    <section id="lab" class="section">
      <div class="section-heading">
        <p class="eyebrow">Interactive 01</p>
        <h2>Story psychology pattern playbook</h2>
      </div>
      <div id="comparisonCards" class="grid cards-grid"></div>
    </section>

    <section id="beforeAfter" class="section">
      <div class="section-heading">
        <p class="eyebrow">Interactive 02</p>
        <h2>Good vs bad hooks (quick rewrites)</h2>
      </div>
      <div id="beforeAfterCards" class="grid cards-grid"></div>
    </section>

    <section id="principles" class="section"></section>

    <section id="closing" class="section closing"></section>
  </main>

  <footer class="site-footer shell">
    <p>Built as a living thought-tool. Keep refining the story.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
